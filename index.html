<style>
  :root{
    --bg: #CFD7D1;
    --bg2: #DBD9CE;
    --surface: #E8E6DB;
    --text: #16302C;
    --muted: #56675F;
    --border: #C2CBC4;
    --gold: #BD9439;
    --gold-soft: #BD94391E;
    --green: #3CBE84;
    --green-soft: #3CBE841E;
    --ring: #BD943955;
    --sky-top: #D6E3D9;
    --sky-bottom: #EAD9AF;
    --silhouette: #16332E;
    --glow: #F3CE7E;
  }
  html.dark{
    --bg: #16302B;
    --bg2: #1F423C;
    --surface: #2A5750;
    --text: #EAF1EC;
    --muted: #A6C1B4;
    --border: #3D6C62;
    --gold: #E3BE6E;
    --gold-soft: #E3BE6E22;
    --green: #5EE3A6;
    --green-soft: #5EE3A62A;
    --ring: #E3BE6E55;
    --sky-top: #17322D;
    --sky-bottom: #2A5A50;
    --silhouette: #0B1F1B;
    --glow: #E3BE6E;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  body{
    background: linear-gradient(180deg, var(--bg2), var(--bg) 420px, var(--bg));
    color: var(--text);
    transition: background-color .35s ease, color .35s ease;
  }
  .card-surface{ background: var(--surface); border-color: var(--border); }
  .focus-ring:focus-visible{ outline: none; box-shadow: 0 0 0 3px var(--ring); }
  .arc-node{ transition: fill .35s ease, stroke .35s ease, r .35s ease; }
  .fade-in{ animation: fadeIn .6s ease both; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(6px);} to{ opacity:1; transform:translateY(0);} }
  @keyframes twinkle{ 0%,100%{ opacity:.25 } 50%{ opacity:.9 } }
  .star{ animation: twinkle 3.5s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){
    .fade-in{ animation: none; }
    .star{ animation: none; }
    *{ transition-duration: .01ms !important; }
  }
  .prayer-btn[data-done="true"] .check-icon{ transform: scale(1); opacity:1; }
  .check-icon{ transform: scale(.5); opacity:0; transition: transform .25s ease, opacity .2s ease; }
  .pattern-overlay{
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    opacity: .05;
  }
  html.dark .pattern-overlay{ opacity: .07; }

  /* ---- growth / gamification ---- */
  .growth-el{ opacity: 0; transition: opacity 1.1s ease; }
  .growth-el.unlocked{ opacity: 1; }
  .pulse-glow.unlocked{ animation: pulseGlow 3.2s ease-in-out infinite; }
  @keyframes pulseGlow{ 0%,100%{ opacity:.5 } 50%{ opacity:.85 } }

  #levelBadge{ position: relative; overflow: visible; }
  .confetti-dot{
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
    transform: translate(-50%,-50%) rotate(var(--angle)) translateY(0px);
    animation: confettiPop .85s ease-out forwards;
    pointer-events: none;
  }
  @keyframes confettiPop{
    0%{ opacity: 1; transform: translate(-50%,-50%) rotate(var(--angle)) translateY(0px) scale(1); }
    100%{ opacity: 0; transform: translate(-50%,-50%) rotate(var(--angle)) translateY(-34px) scale(.4); }
  }

  #xpBarFill{ transition: width .6s ease; }

  #toast{
    transition: opacity .45s ease, transform .45s ease;
  }

  @media (prefers-reduced-motion: reduce){
    .growth-el{ transition: none; }
    .pulse-glow.unlocked{ animation: none; }
    .confetti-dot{ display: none; }
    #xpBarFill{ transition: none; }
    #toast{ transition: none; }
  }

  /* ---- hero animations ---- */
  .breathe{ animation: pulseGlow 4.5s ease-in-out infinite; }

  @keyframes driftCloud1{ from{ transform: translateX(-50px); } to{ transform: translateX(460px); } }
  @keyframes driftCloud2{ from{ transform: translateX(-40px); } to{ transform: translateX(460px); } }
  .cloud-1{ animation: driftCloud1 52s linear infinite; }
  .cloud-2{ animation: driftCloud2 70s linear infinite; animation-delay: -18s; }

  @keyframes driftBird1{ from{ transform: translateX(-24px); } to{ transform: translateX(420px); } }
  @keyframes driftBird2{ from{ transform: translateX(-24px); } to{ transform: translateX(420px); } }
  .bird-1{ animation: driftBird1 34s linear infinite; }
  .bird-2{ animation: driftBird2 46s linear infinite; animation-delay: -12s; }

  .dome-shimmer{
    transform-box: fill-box; transform-origin: center;
    animation: domeShine 9s ease-in-out infinite;
  }
  @keyframes domeShine{
    0%{ transform: translateX(0); opacity: 0; }
    2%{ opacity: .85; }
    16%{ transform: translateX(420px); opacity: 0; }
    100%{ transform: translateX(420px); opacity: 0; }
  }

  .node-ripple{
    transform-box: fill-box; transform-origin: center;
    animation: nodeRipple .7s ease-out forwards;
    pointer-events: none;
  }
  @keyframes nodeRipple{
    0%{ transform: scale(1); opacity: .9; }
    100%{ transform: scale(2.6); opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce){
    .breathe, .cloud-1, .cloud-2, .bird-1, .bird-2, .dome-shimmer{ animation: none; opacity: 0; }
    .node-ripple{ display: none; }
  }

  /* ---- tabs & calendar ---- */
  .segmented-btn{ color: var(--muted); }
  .segmented-btn[aria-selected="true"]{
    background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }

  .cal-day{
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; border-radius: 12px; font-size: .8rem; font-weight: 500; border: 1.5px solid transparent;
    background: transparent; color: var(--text); cursor: pointer; width: 100%;
    transition: background-color .15s ease, border-color .15s ease;
  }
  .cal-day:not(:disabled):hover{ background: var(--border); }
  .cal-day:disabled{ opacity: .25; cursor: default; }
  .cal-day[data-today="true"]{ border-color: var(--gold); }
  .cal-day[data-selected="true"]{ background: var(--gold-soft); border: 2px solid var(--gold); font-weight: 700; }
  .cal-day-dot{ width: 6px; height: 6px; border-radius: 50%; background: transparent; transition: background-color .2s ease; }

  #calPrev, #calNext{ background: transparent; }
  #calPrev:hover, #calNext:hover{ background: var(--border); color: var(--text); }

  .cal-prayer-row{
    display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 12px;
    cursor: pointer; background: transparent; width: 100%; text-align: left; border: none;
    transition: background-color .15s ease;
  }
</style>
</head>

        <div class="flex items-center justify-center gap-5 mt-4 pt-3" style="border-top:1px solid var(--border)">
          <span class="flex items-center gap-1.5 text-xs" style="color:var(--muted)"><span class="w-2 h-2 rounded-full shrink-0" style="background:var(--green)"></span>Tamamlandı</span>
          <span class="flex items-center gap-1.5 text-xs" style="color:var(--muted)"><span class="w-2 h-2 rounded-full shrink-0" style="background:var(--gold)"></span>Kısmi</span>
          <span class="flex items-center gap-1.5 text-xs" style="color:var(--muted)"><span class="w-2 h-2 rounded-full shrink-0 border" style="border-color:var(--border)"></span>Boş</span>
        </div>
      </div>

      <div class="rounded-2xl border p-4 card-surface fade-in" id="calDetail" style="border-color:var(--border)">
        <p id="calSelectedDate" class="font-serif italic text-sm mb-3" style="color:var(--muted)"></p>
        <div id="calPrayerList" class="space-y-2"></div>
      </div>
    </div>


  </div>

  <div id="toast" class="fixed left-1/2 bottom-6 -translate-x-1/2 translate-y-4 opacity-0 pointer-events-none px-5 py-3 rounded-2xl text-sm font-semibold z-50 shadow-lg" style="background:var(--surface); border:1px solid var(--gold); color:var(--text)">
    <span id="toastText"></span>
  </div>

  <!-- Ayarlar modalı -->
  <div id="settingsModal" class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center">
    <div id="settingsBackdrop" class="absolute inset-0" style="background:rgba(10,15,13,.5)"></div>
    <div class="relative w-full sm:max-w-sm rounded-t-3xl sm:rounded-3xl border p-5 sm:p-6 card-surface max-h-[88vh] overflow-y-auto" style="border-color:var(--border)">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif text-lg font-semibold">Ayarlar</h2>
        <button id="settingsClose" aria-label="Kapat" class="focus-ring w-8 h-8 rounded-full flex items-center justify-center" style="color:var(--muted)">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <label class="block text-xs font-semibold mb-2 tracking-wide" style="color:var(--muted)">TEMA</label>
      <div class="flex gap-1 p-1 rounded-full mb-6" style="background:var(--border)">
        <button id="themeLightBtn" type="button" class="segmented-btn flex-1 py-2 rounded-full text-sm font-semibold transition-colors" aria-selected="false">☀️ Açık</button>
        <button id="themeDarkBtn" type="button" class="segmented-btn flex-1 py-2 rounded-full text-sm font-semibold transition-colors" aria-selected="false">🌙 Koyu</button>
      </div>

      <label class="block text-xs font-semibold mb-2 tracking-wide" style="color:var(--muted)">KONUM</label>
      <div class="space-y-2 mb-2">
        <select id="countrySelect" class="focus-ring w-full rounded-xl border px-3.5 py-2.5 text-sm" style="border-color:var(--border); background:var(--bg); color:var(--text)">
          <option value="">Ülke seçin…</option>
        </select>
        <select id="citySelect" class="focus-ring w-full rounded-xl border px-3.5 py-2.5 text-sm" style="border-color:var(--border); background:var(--bg); color:var(--text)" disabled>
          <option value="">Önce ülke seçin…</option>
        </select>
      </div>
      <p id="locationStatus" class="text-xs mb-4 min-h-[1em]" style="color:var(--muted)"></p>

      <button id="saveLocationBtn" class="w-full rounded-xl py-2.5 text-sm font-semibold" style="background:var(--gold); color:var(--silhouette)">Kaydet</button>
      <p class="text-center text-[11px] mt-4" style="color:var(--muted)">Vakitler <a href="https://aladhan.com" target="_blank" rel="noopener" class="underline">Aladhan API</a>, ülke/şehir listesi <a href="https://countriesnow.space" target="_blank" rel="noopener" class="underline">CountriesNow API</a> üzerinden alınır.</p>
    </div>
  </div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "vakt_state_v1";
  var THEME_KEY = "vakt_theme";
  var PRAYER_KEYS = ["imsak","ogle","ikindi","aksam","yatsi"];

  var PRAYER_META = {
    imsak:  { label: "İmsak",  sub: "Şafak vakti",       icon: '<line x1="3" y1="17" x2="21" y2="17"/><path d="M6 17a6 6 0 0 1 12 0"/><path d="M12 4v3M6.5 8.8 8 10.2M17.5 8.8 16 10.2"/>' },
    ogle:   { label: "Öğle",   sub: "Günün ortası",      icon: '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>' },
    ikindi: { label: "İkindi", sub: "Öğleden sonra",     icon: '<line x1="3" y1="18" x2="21" y2="18"/><circle cx="12" cy="12" r="4"/><path d="M12 4v2M4.8 8.3l1.4 1.4M19.2 8.3l-1.4 1.4"/>' },
    aksam:  { label: "Akşam",  sub: "Gün batımı",        icon: '<line x1="3" y1="13" x2="21" y2="13"/><path d="M6 13a6 6 0 0 1 12 0"/><path d="M9 17h6M7.5 20h9"/>' },
    yatsi:  { label: "Yatsı",  sub: "Gecenin sükûneti",  icon: '<path d="M17 12.5A5.5 5.5 0 1 1 11.5 7a4.2 4.2 0 0 0 5.5 5.5Z"/><circle cx="19" cy="6" r=".6" fill="var(--gold)"/><circle cx="6" cy="9" r=".5" fill="var(--gold)"/>' }
  };

  /* ---------- Gelişim sistemi (XP / seviye) ---------- */
  var XP_PER_PRAYER = 10;
  var DAY_BONUS = 20;
  var WEEK_STREAK_BONUS = 40;
  var TITLES = [
    "Yeni Başlangıç", "Kararlı Adım", "İlk Sebat", "Sadakat", "İstikrar",
    "Vakte Sadık", "Nur Yolcusu", "İstikamet Sahibi", "Vakt Bekçisi", "Vakt Ustası"
  ];

  function levelInfo(xp){
    var level = 1, remaining = xp || 0, need = 50;
    while(remaining >= need){
      remaining -= need;
      level += 1;
      need = 50 + (level - 1) * 25;
    }
    return { level: level, into: remaining, need: need };
  }

  function levelTitle(level){
    return TITLES[Math.min(level, TITLES.length) - 1];
  }

  function growthTier(level){
    if(level >= 7) return 4;
    if(level >= 5) return 3;
    if(level >= 3) return 2;
    return 1;
  }

  /* ---------- Theme ---------- */
  var root = document.documentElement;
  var themeLightBtn = document.getElementById("themeLightBtn");
  var themeDarkBtn = document.getElementById("themeDarkBtn");

  function applyTheme(theme){
    if(theme === "dark"){
      root.classList.add("dark");
    } else {
      root.classList.remove("dark");
    }
    themeLightBtn.setAttribute("aria-selected", theme === "dark" ? "false" : "true");
    themeDarkBtn.setAttribute("aria-selected", theme === "dark" ? "true" : "false");
    var metaTheme = document.getElementById("metaThemeColor");
    if(metaTheme) metaTheme.setAttribute("content", theme === "dark" ? "#2A5750" : "#E8E6DB");
  }

  function initTheme(){
    var saved = localStorage.getItem(THEME_KEY);
    if(saved === "dark" || saved === "light"){
      applyTheme(saved);
    } else {
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyTheme(prefersDark ? "dark" : "light");
    }
  }

  themeLightBtn.addEventListener("click", function(){
    applyTheme("light");
    localStorage.setItem(THEME_KEY, "light");
  });
  themeDarkBtn.addEventListener("click", function(){
    applyTheme("dark");
    localStorage.setItem(THEME_KEY, "dark");
  });

  initTheme();

  /* ---------- PWA: ana ekrana ekleme ---------- */
  var installBtn = document.getElementById("installBtn");
  var deferredPrompt = null;
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true;

  function showInstallBtn(){ installBtn.classList.remove("hidden"); installBtn.classList.add("flex"); }
  function hideInstallBtn(){ installBtn.classList.add("hidden"); installBtn.classList.remove("flex"); }

  if(!isStandalone){
    window.addEventListener("beforeinstallprompt", function(e){
      e.preventDefault();
      deferredPrompt = e;
      showInstallBtn();
    });

    if(isIOS){
      showInstallBtn();
    }
  }

  window.addEventListener("appinstalled", function(){
    hideInstallBtn();
    deferredPrompt = null;
    showToast("Vakt ana ekranınıza eklendi \u2728");
  });

  installBtn.addEventListener("click", function(){
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){
        deferredPrompt = null;
        hideInstallBtn();
      });
    } else if(isIOS){
      showToast("Paylaş simgesine dokunup \"Ana Ekrana Ekle\"yi seçin \uD83D\uDCF2");
    }
  });

  if("serviceWorker" in navigator){
    try{
      var swCode = "self.addEventListener('fetch', function(e){ e.respondWith(fetch(e.request).catch(function(){ return new Response('', {status:200}); })); });";
      var swBlob = new Blob([swCode], { type: "application/javascript" });
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(function(){ /* sessizce yok say */ });
    }catch(e){ /* servis çalışanı desteklenmiyor olabilir */ }
  }

  /* ---------- Toast & kutlama ---------- */
  var toastEl = document.getElementById("toast");
  var toastTextEl = document.getElementById("toastText");
  var toastTimer = null;
  var reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function showToast(msg){
    toastTextEl.textContent = msg;
    toastEl.classList.remove("opacity-0", "translate-y-4", "pointer-events-none");
    toastEl.classList.add("opacity-100", "translate-y-0");
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){
      toastEl.classList.add("opacity-0", "translate-y-4", "pointer-events-none");
      toastEl.classList.remove("opacity-100", "translate-y-0");
    }, 3200);
  }

  function burstConfetti(){
    if(reducedMotion) return;
    var badge = document.getElementById("levelBadge");
    for(var i = 0; i < 8; i++){
      (function(i){
        var dot = document.createElement("span");
        dot.className = "confetti-dot";
        dot.style.setProperty("--angle", (i * 45) + "deg");
        badge.appendChild(dot);
        setTimeout(function(){ dot.remove(); }, 900);
      })(i);
    }
  }

  function celebrateLevelUp(newLevel){
    showToast("Seviye " + newLevel + ": " + levelTitle(newLevel) + " \u2728");
    burstConfetti();
  }

  function celebrateStreak(streakCount){
    showToast(streakCount + " günlük seri! +" + WEEK_STREAK_BONUS + " XP \uD83C\uDF19");
  }

  function spawnRipple(node){
    if(reducedMotion || !node) return;
    var svgNS = "http://www.w3.org/2000/svg";
    var ripple = document.createElementNS(svgNS, "circle");
    ripple.setAttribute("cx", node.getAttribute("cx"));
    ripple.setAttribute("cy", node.getAttribute("cy"));
    ripple.setAttribute("r", "8.5");
    ripple.setAttribute("fill", "none");
    ripple.setAttribute("stroke", "var(--green)");
    ripple.setAttribute("stroke-width", "2");
    ripple.setAttribute("class", "node-ripple");
    node.parentNode.appendChild(ripple);
    setTimeout(function(){ ripple.remove(); }, 750);
  }

  /* ---------- Date helpers ---------- */
  function todayStr(d){
    d = d || new Date();
    var off = d.getTimezoneOffset();
    var local = new Date(d.getTime() - off * 60000);
    return local.toISOString().slice(0, 10);
  }

  function daysBetween(a, b){
    var da = new Date(a + "T00:00:00Z").getTime();
    var db = new Date(b + "T00:00:00Z").getTime();
    return Math.round((db - da) / 86400000);
  }

  function formatDateLabel(){
    var d = new Date();
    var label = d.toLocaleDateString("tr-TR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    return label.charAt(0).toUpperCase() + label.slice(1);
  }

  /* ---------- State ---------- */
  function emptyPrayers(){
    var o = {};
    PRAYER_KEYS.forEach(function(k){ o[k] = false; });
    return o;
  }

  function loadState(){
    var raw = localStorage.getItem(STORAGE_KEY);
    var state;
    if(raw){
      try{ state = JSON.parse(raw); }catch(e){ state = null; }
    }
    if(!state || !state.date || !state.prayers){
      state = { date: todayStr(), prayers: emptyPrayers(), streak: 0, xp: 0, history: {} };
      saveState(state);
      return state;
    }
    if(typeof state.xp !== "number" || isNaN(state.xp)){
      state.xp = 0;
    }
    if(!state.history || typeof state.history !== "object"){
      state.history = {};
    }

    var today = todayStr();
    if(state.date !== today){
      var diff = daysBetween(state.date, today);
      var allDone = PRAYER_KEYS.every(function(k){ return !!state.prayers[k]; });

      state.history[state.date] = Object.assign({}, state.prayers);

      if(diff === 1 && allDone){
        state.streak = (state.streak || 0) + 1;
      } else {
        state.streak = 0;
      }

      if(state.streak > 0 && state.streak % 7 === 0){
        state.xp = (state.xp || 0) + WEEK_STREAK_BONUS;
        celebrateStreak(state.streak);
      }

      state.date = today;
      state.prayers = emptyPrayers();
      saveState(state);
    }
    state.history[state.date] = Object.assign({}, state.prayers);
    return state;
  }

  function saveState(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  var state = loadState();

  /* ---------- Render ---------- */
  var dateLabelEl = document.getElementById("dateLabel");
  var streakCountEl = document.getElementById("streakCount");
  var progressPctEl = document.getElementById("progressPct");
  var levelNumEl = document.getElementById("levelNum");
  var levelTitleEl = document.getElementById("levelTitle");
  var xpLabelEl = document.getElementById("xpLabel");
  var xpBarFillEl = document.getElementById("xpBarFill");
  var growthEls = Array.prototype.slice.call(document.querySelectorAll(".growth-el"));
  var buttons = Array.prototype.slice.call(document.querySelectorAll(".prayer-btn"));

  function completedCount(){
    return PRAYER_KEYS.reduce(function(sum, k){ return sum + (state.prayers[k] ? 1 : 0); }, 0);
  }

  function render(){
    dateLabelEl.textContent = formatDateLabel();

    var done = completedCount();
    var pct = Math.round((done / PRAYER_KEYS.length) * 100);
    var allDoneToday = done === PRAYER_KEYS.length;

    streakCountEl.textContent = String((state.streak || 0) + (allDoneToday ? 1 : 0));
    progressPctEl.textContent = pct + "%";

    var info = levelInfo(state.xp || 0);
    levelNumEl.textContent = String(info.level);
    levelTitleEl.textContent = levelTitle(info.level);
    xpLabelEl.textContent = info.into + " / " + info.need + " XP";
    xpBarFillEl.style.width = Math.round((info.into / info.need) * 100) + "%";

    var tier = growthTier(info.level);
    growthEls.forEach(function(el){
      var elTier = parseInt(el.getAttribute("data-tier"), 10) || 1;
      if(elTier <= tier){
        el.classList.add("unlocked");
      } else {
        el.classList.remove("unlocked");
      }
    });

    buttons.forEach(function(btn){
      var key = btn.getAttribute("data-key");
      var isDone = !!state.prayers[key];
      btn.setAttribute("data-done", isDone ? "true" : "false");
      btn.setAttribute("aria-pressed", isDone ? "true" : "false");

      var checkWrap = btn.querySelector(".check-wrap");
      if(isDone){
        btn.style.background = "var(--green-soft)";
        btn.style.borderColor = "var(--green)";
        checkWrap.style.background = "var(--green)";
        checkWrap.style.borderColor = "var(--green)";
      } else {
        btn.style.background = "var(--surface)";
        btn.style.borderColor = "var(--border)";
        checkWrap.style.background = "transparent";
        checkWrap.style.borderColor = "var(--border)";
      }

      var node = document.querySelector('.arc-node[data-node="' + key + '"]');
      if(node){
        if(isDone){
          node.setAttribute("fill", "var(--green)");
          node.setAttribute("stroke", "var(--green)");
          node.setAttribute("r", "8.5");
        } else {
          node.setAttribute("fill", "var(--surface)");
          node.setAttribute("stroke", "var(--gold)");
          node.setAttribute("r", "7");
        }
      }
    });
  }

  function togglePrayerToday(key){
    var wasAllDone = completedCount() === PRAYER_KEYS.length;
    var prevLevel = levelInfo(state.xp || 0).level;

    state.prayers[key] = !state.prayers[key];
    state.xp = (state.xp || 0) + (state.prayers[key] ? XP_PER_PRAYER : -XP_PER_PRAYER);

    var isAllDone = completedCount() === PRAYER_KEYS.length;
    if(isAllDone && !wasAllDone){
      state.xp += DAY_BONUS;
    } else if(!isAllDone && wasAllDone){
      state.xp -= DAY_BONUS;
    }
    if(state.xp < 0) state.xp = 0;

    if(!state.history) state.history = {};
    state.history[state.date] = Object.assign({}, state.prayers);

    saveState(state);
    render();
    renderCalendarGrid();
    if(calSelectedDate === state.date) renderCalendarDetail();

    if(state.prayers[key]){
      spawnRipple(document.querySelector('.arc-node[data-node="' + key + '"]'));
    }

    var newLevel = levelInfo(state.xp).level;
    if(newLevel > prevLevel){
      celebrateLevelUp(newLevel);
    }
  }

  buttons.forEach(function(btn){
    btn.addEventListener("click", function(){
      togglePrayerToday(btn.getAttribute("data-key"));
    });
  });

  render();

  /* ---------- Midnight rollover while app stays open ---------- */
  setInterval(function(){
    var fresh = loadState();
    if(fresh.date !== state.date){
      state = fresh;
      render();
      renderCalendarGrid();
      renderCalendarDetail();
    }
  }, 30000);

  /* ---------- Sekmeler ---------- */
  var tabBtnToday = document.getElementById("tabBtnToday");
  var tabBtnCalendar = document.getElementById("tabBtnCalendar");
  var viewToday = document.getElementById("viewToday");
  var viewCalendar = document.getElementById("viewCalendar");

  function setActiveTab(tab){
    var showCalendar = tab === "calendar";
    viewToday.classList.toggle("hidden", showCalendar);
    viewCalendar.classList.toggle("hidden", !showCalendar);
    tabBtnToday.setAttribute("aria-selected", showCalendar ? "false" : "true");
    tabBtnCalendar.setAttribute("aria-selected", showCalendar ? "true" : "false");
    if(showCalendar){
      renderCalendarGrid();
      renderCalendarDetail();
    }
  }

  tabBtnToday.addEventListener("click", function(){ setActiveTab("today"); });
  tabBtnCalendar.addEventListener("click", function(){ setActiveTab("calendar"); });

  /* ---------- Takvim ---------- */
  var calMonthLabelEl = document.getElementById("calMonthLabel");
  var calGridEl = document.getElementById("calGrid");
  var calSelectedDateEl = document.getElementById("calSelectedDate");
  var calPrayerListEl = document.getElementById("calPrayerList");
  var calPrevBtn = document.getElementById("calPrev");
  var calNextBtn = document.getElementById("calNext");

  var calViewDate = new Date();
  calViewDate.setDate(1);
  var calSelectedDate = state.date;

  function pad2(n){ return n < 10 ? "0" + n : String(n); }

  function dateStrOf(y, m, d){ return y + "-" + pad2(m + 1) + "-" + pad2(d); }

  function dayRecord(dateStr){
    if(dateStr === state.date) return state.prayers;
    return (state.history && state.history[dateStr]) || null;
  }

  function dayCompletedCount(dateStr){
    var rec = dayRecord(dateStr);
    if(!rec) return 0;
    return PRAYER_KEYS.reduce(function(sum, k){ return sum + (rec[k] ? 1 : 0); }, 0);
  }

  function renderCalendarGrid(){
    if(!calGridEl) return;
    var year = calViewDate.getFullYear();
    var month = calViewDate.getMonth();
    var label = calViewDate.toLocaleDateString("tr-TR", { month: "long", year: "numeric" });
    calMonthLabelEl.textContent = label.charAt(0).toUpperCase() + label.slice(1);

    var firstDay = new Date(year, month, 1);
    var startOffset = (firstDay.getDay() + 6) % 7;
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var today = state.date;

    var html = "";
    for(var i = 0; i < startOffset; i++){
      html += '<span></span>';
    }
    for(var day = 1; day <= daysInMonth; day++){
      var dateStr = dateStrOf(year, month, day);
      var isFuture = dateStr > today;
      var isToday = dateStr === today;
      var isSelected = dateStr === calSelectedDate;
      var count = dayCompletedCount(dateStr);
      var dotColor = count === 0 ? "transparent" : (count === PRAYER_KEYS.length ? "var(--green)" : "var(--gold)");

      html += '<button type="button" class="cal-day" data-date="' + dateStr + '"'
        + (isToday ? ' data-today="true"' : '')
        + (isSelected ? ' data-selected="true"' : '')
        + (isFuture ? ' disabled' : '')
        + '><span>' + day + '</span><span class="cal-day-dot" style="background:' + dotColor + '"></span></button>';
    }
    calGridEl.innerHTML = html;
  }

  function renderCalendarDetail(){
    if(!calPrayerListEl) return;
    var d = new Date(calSelectedDate + "T00:00:00");
    var label = d.toLocaleDateString("tr-TR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    calSelectedDateEl.textContent = label.charAt(0).toUpperCase() + label.slice(1);

    var rec = dayRecord(calSelectedDate) || emptyPrayers();
    var html = "";
    PRAYER_KEYS.forEach(function(key){
      var meta = PRAYER_META[key];
      var isDone = !!rec[key];
      html += '<button type="button" class="cal-prayer-row focus-ring" data-key="' + key + '" style="background:' + (isDone ? "var(--green-soft)" : "transparent") + '">'
        + '<span class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background:' + (isDone ? "var(--green-soft)" : "var(--gold-soft)") + '">'
        + '<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="' + (isDone ? "var(--green)" : "var(--gold)") + '" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + meta.icon + '</svg>'
        + '</span>'
        + '<span class="flex-1 text-left">'
        + '<span class="block font-semibold text-sm">' + meta.label + '</span>'
        + '<span class="block text-xs" style="color:var(--muted)">' + meta.sub + '</span>'
        + '</span>'
        + '<span class="w-6 h-6 rounded-full border flex items-center justify-center shrink-0" style="border-color:' + (isDone ? "var(--green)" : "var(--border)") + '; background:' + (isDone ? "var(--green)" : "transparent") + '">'
        + (isDone ? '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>' : '')
        + '</span>'
        + '</button>';
    });
    calPrayerListEl.innerHTML = html;
  }

  function selectCalendarDate(dateStr){
    calSelectedDate = dateStr;
    renderCalendarGrid();
    renderCalendarDetail();
  }

  function togglePastPrayer(dateStr, key){
    if(!state.history) state.history = {};
    if(!state.history[dateStr]) state.history[dateStr] = emptyPrayers();
    state.history[dateStr][key] = !state.history[dateStr][key];
    saveState(state);
    renderCalendarGrid();
    renderCalendarDetail();
  }

  calGridEl.addEventListener("click", function(e){
    var cell = e.target.closest(".cal-day");
    if(!cell || cell.disabled) return;
    selectCalendarDate(cell.getAttribute("data-date"));
  });

  calPrayerListEl.addEventListener("click", function(e){
    var row = e.target.closest(".cal-prayer-row");
    if(!row) return;
    var key = row.getAttribute("data-key");
    if(calSelectedDate === state.date){
      togglePrayerToday(key);
    } else {
      togglePastPrayer(calSelectedDate, key);
    }
  });

  calPrevBtn.addEventListener("click", function(){
    calViewDate.setMonth(calViewDate.getMonth() - 1);
    renderCalendarGrid();
  });
  calNextBtn.addEventListener("click", function(){
    calViewDate.setMonth(calViewDate.getMonth() + 1);
    renderCalendarGrid();
  });

  renderCalendarGrid();
  renderCalendarDetail();

  /* ---------- Konum & namaz vakitleri (Aladhan API) ---------- */
  var LOCATION_KEY = "vakt_location";
  var TIMES_CACHE_KEY = "vakt_prayertimes_cache";
  var CITIES_CACHE_KEY = "vakt_cities_cache";

  var settingsBtn = document.getElementById("settingsBtn");
  var settingsModal = document.getElementById("settingsModal");
  var settingsBackdrop = document.getElementById("settingsBackdrop");
  var settingsClose = document.getElementById("settingsClose");
  var countrySelect = document.getElementById("countrySelect");
  var citySelect = document.getElementById("citySelect");
  var locationStatusEl = document.getElementById("locationStatus");
  var saveLocationBtn = document.getElementById("saveLocationBtn");
  var locationPill = document.getElementById("locationPill");
  var locationPillText = document.getElementById("locationPillText");

  var countriesList = null;
  var citiesCache = {};

  function loadLocation(){
    try{ return JSON.parse(localStorage.getItem(LOCATION_KEY)); }catch(e){ return null; }
  }

  function saveLocation(loc){
    localStorage.setItem(LOCATION_KEY, JSON.stringify(loc));
  }

  function updateLocationPill(){
    var loc = loadLocation();
    if(loc && loc.city){
      locationPillText.textContent = loc.city + (loc.country ? ", " + loc.country : "");
      locationPill.classList.remove("hidden");
      locationPill.classList.add("flex");
    } else {
      locationPill.classList.add("hidden");
      locationPill.classList.remove("flex");
    }
  }

  function fillSelect(select, items, placeholder){
    var html = '<option value="">' + placeholder + '</option>';
    items.forEach(function(name){
      html += '<option value="' + name.replace(/"/g, "&quot;") + '">' + name + '</option>';
    });
    select.innerHTML = html;
  }

  function extractName(item){
    if(typeof item === "string") return item;
    if(!item || typeof item !== "object") return null;
    return item.name || item.country || item.countryName || item.city || item.title || null;
  }

  /* Ülke listesi restcountries.com'dan alınıp dosyaya gömüldü; sadece şehirler
     için canlı bir API çağrısı gerekiyor. Böylece "ülke seçin" listesi
     internetten bağımsız olarak, her zaman anında dolar. */
  var COUNTRY_NAMES = ["Afghanistan", "Albania", "Algeria", "American Samoa", "Andorra", "Angola", "Anguilla", "Antigua and Barbuda", "Argentina", "Armenia", "Aruba", "Australia", "Austria", "Azerbaijan", "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bermuda", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "British Indian Ocean Territory", "British Virgin Islands", "Brunei", "Bulgaria", "Burkina Faso", "Burundi", "Cambodia", "Cameroon", "Canada", "Cape Verde", "Caribbean Netherlands", "Cayman Islands", "Central African Republic", "Chad", "Chile", "China", "Christmas Island", "Cocos (Keeling) Islands", "Colombia", "Comoros", "Cook Islands", "Costa Rica", "Croatia", "Cuba", "Curaçao", "Cyprus", "Czechia", "Denmark", "Djibouti", "Dominica", "Dominican Republic", "DR Congo", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Falkland Islands", "Faroe Islands", "Fiji", "Finland", "France", "French Guiana", "French Polynesia", "French Southern and Antarctic Lands", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Gibraltar", "Greece", "Greenland", "Grenada", "Guadeloupe", "Guam", "Guatemala", "Guernsey", "Guinea", "Guinea-Bissau", "Guyana", "Haiti", "Honduras", "Hong Kong", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Isle of Man", "Israel", "Italy", "Ivory Coast", "Jamaica", "Japan", "Jersey", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Kosovo", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Martinique", "Mauritania", "Mauritius", "Mayotte", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Montserrat", "Morocco", "Mozambique", "Myanmar", "Namibia", "Nauru", "Nepal", "Netherlands", "New Caledonia", "New Zealand", "Nicaragua", "Niger", "Nigeria", "Niue", "Norfolk Island", "North Korea", "North Macedonia", "Northern Mariana Islands", "Norway", "Oman", "Pakistan", "Palau", "Palestine", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Pitcairn Islands", "Poland", "Portugal", "Puerto Rico", "Qatar", "Republic of the Congo", "Romania", "Russia", "Rwanda", "Réunion", "Saint Barthélemy", "Saint Helena, Ascension and Tristan da Cunha", "Saint Kitts and Nevis", "Saint Lucia", "Saint Martin", "Saint Pierre and Miquelon", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Sint Maarten", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Georgia", "South Korea", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Svalbard and Jan Mayen", "Sweden", "Switzerland", "Syria", "São Tomé and Príncipe", "Taiwan", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tokelau", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Turks and Caicos Islands", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "United States Minor Outlying Islands", "United States Virgin Islands", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", "Wallis and Futuna", "Western Sahara", "Yemen", "Zambia", "Zimbabwe", "Åland Islands"];

  function ensureCountriesLoaded(){
    countriesList = COUNTRY_NAMES;
    return Promise.resolve(countriesList);
  }

  function loadCitiesForCountry(country){
    if(citiesCache[country]){ return Promise.resolve(citiesCache[country]); }
    try{
      var cached = JSON.parse(localStorage.getItem(CITIES_CACHE_KEY)) || {};
      if(cached[country] && cached[country].length){
        citiesCache[country] = cached[country];
        return Promise.resolve(cached[country]);
      }
    }catch(e){ /* yok say */ }

    return fetch("https://countriesnow.space/api/v0.1/countries/cities", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ country: country })
    })
      .then(function(res){ if(!res.ok) throw new Error("network"); return res.json(); })
      .then(function(json){
        var raw = (json && json.data) || [];
        var cities = raw.map(extractName).filter(Boolean);
        citiesCache[country] = cities;
        try{
          var allCached = JSON.parse(localStorage.getItem(CITIES_CACHE_KEY)) || {};
          allCached[country] = cities;
          localStorage.setItem(CITIES_CACHE_KEY, JSON.stringify(allCached));
        }catch(e){ /* yok say */ }
        return cities;
      });
  }

  function populateCitySelect(country, selectedCity){
    citySelect.disabled = true;
    fillSelect(citySelect, [], "Yükleniyor…");
    loadCitiesForCountry(country)
      .then(function(cities){
        if(!cities.length){
          fillSelect(citySelect, [], "Şehir bulunamadı");
          citySelect.disabled = true;
          return;
        }
        fillSelect(citySelect, cities, "Şehir seçin…");
        citySelect.disabled = false;
        if(selectedCity && cities.indexOf(selectedCity) !== -1){
          citySelect.value = selectedCity;
        }
      })
      .catch(function(){
        fillSelect(citySelect, [], "Şehir listesi alınamadı");
        citySelect.disabled = true;
        locationStatusEl.textContent = "Şehir listesi alınamadı, tekrar deneyin.";
      });
  }

  countrySelect.addEventListener("change", function(){
    var country = countrySelect.value;
    locationStatusEl.textContent = "";
    if(!country){
      fillSelect(citySelect, [], "Önce ülke seçin…");
      citySelect.disabled = true;
      return;
    }
    populateCitySelect(country, null);
  });

  function openSettingsModal(){
    var loc = loadLocation();
    locationStatusEl.textContent = "";

    fillSelect(countrySelect, [], "Yükleniyor…");
    ensureCountriesLoaded()
      .then(function(names){
        fillSelect(countrySelect, names, "Ülke seçin…");
        var defaultCountry = (loc && loc.country) || (names.indexOf("Turkey") !== -1 ? "Turkey" : "");
        if(defaultCountry){
          countrySelect.value = defaultCountry;
          populateCitySelect(defaultCountry, loc && loc.city);
        }
      })
      .catch(function(){
        fillSelect(countrySelect, [], "Ülke listesi alınamadı");
        locationStatusEl.textContent = "Ülke listesi alınamadı, internetinizi kontrol edip tekrar açın.";
      });

    settingsModal.classList.remove("hidden");
  }

  function closeSettingsModal(){
    settingsModal.classList.add("hidden");
  }

  settingsBtn.addEventListener("click", openSettingsModal);
  settingsClose.addEventListener("click", closeSettingsModal);
  settingsBackdrop.addEventListener("click", closeSettingsModal);
  locationPill.addEventListener("click", openSettingsModal);

  function loadTimesCache(){
    try{ return JSON.parse(localStorage.getItem(TIMES_CACHE_KEY)); }catch(e){ return null; }
  }

  function saveTimesCache(loc, times){
    localStorage.setItem(TIMES_CACHE_KEY, JSON.stringify({ date: state.date, city: loc.city, country: loc.country, times: times }));
  }

  function applyPrayerTimesToCards(times){
    PRAYER_KEYS.forEach(function(key){
      var subEl = document.querySelector('.prayer-btn[data-key="' + key + '"] .prayer-sub');
      if(subEl && times && times[key]){
        subEl.textContent = PRAYER_META[key].sub + " · " + times[key];
      }
    });
  }

  function resetPrayerTimeLabels(){
    PRAYER_KEYS.forEach(function(key){
      var subEl = document.querySelector('.prayer-btn[data-key="' + key + '"] .prayer-sub');
      if(subEl) subEl.textContent = PRAYER_META[key].sub;
    });
  }

  function fetchAndApplyPrayerTimes(opts){
    opts = opts || {};
    var loc = loadLocation();
    if(!loc || !loc.city){
      resetPrayerTimeLabels();
      return;
    }

    var cache = loadTimesCache();
    if(cache && cache.date === state.date && cache.city === loc.city && cache.country === loc.country){
      applyPrayerTimesToCards(cache.times);
      if(opts.announce) showToast(loc.city + " için vakitler güncel \u2713");
      return;
    }

    var url = "https://api.aladhan.com/v1/timingsByCity?city=" + encodeURIComponent(loc.city)
      + "&country=" + encodeURIComponent(loc.country) + "&method=13";

    fetch(url)
      .then(function(res){
        if(!res.ok) throw new Error("network");
        return res.json();
      })
      .then(function(json){
        if(!json || json.code !== 200 || !json.data || !json.data.timings){
          throw new Error("bad response");
        }
        var t = json.data.timings;
        var times = { imsak: t.Imsak, ogle: t.Dhuhr, ikindi: t.Asr, aksam: t.Maghrib, yatsi: t.Isha };
        saveTimesCache(loc, times);
        applyPrayerTimesToCards(times);
        if(opts.announce) showToast(loc.city + " için vakitler güncellendi \u2713");
      })
      .catch(function(){
        resetPrayerTimeLabels();
        showToast("Vakitler alınamadı, konumu kontrol edin");
      });
  }

  saveLocationBtn.addEventListener("click", function(){
    var country = countrySelect.value;
    var city = citySelect.value;
    if(!country || !city){
      locationStatusEl.textContent = "Lütfen ülke ve şehir seçin.";
      return;
    }
    saveLocation({ city: city, country: country });
    updateLocationPill();
    closeSettingsModal();
    fetchAndApplyPrayerTimes({ announce: true });
  });

  updateLocationPill();
  fetchAndApplyPrayerTimes({ announce: false });

})();
</script>
